# configs/training/base.yaml
#
# Training hyperparameters: optimizer, scheduler, batch size, EMA, etc.
# Kept separate from model.yaml because these two config groups vary
# INDEPENDENTLY — you might sweep learning rate without touching
# architecture, or vice versa. Hydra's config-group system is built
# exactly for this kind of independent-axis composition.

# WHY LOWERED FROM 2e-4: two separate collapses (NaN at step ~23,923, then
# loss flatlining to ~1.0 at step ~12,700 on the next attempt) both point to
# the optimizer taking steps too large for this model/batch size combo.
# Halving LR trades a small amount of convergence speed for meaningfully
# more headroom before hitting the same instability a third time.
# WHY LOWERED FROM 128: disabling AMP (mixed_precision: false, below) means
# forward/backward activations are stored in fp32 instead of fp16, roughly
# doubling per-step memory. The fp16 validation run already reserved ~9.5GB
# on the T4's 16GB at batch_size=128 — fp32 at the same batch size hit a
# real CUDA OOM during the very first forward pass after resuming. Halving
# batch_size brings activation memory back into a safe range while staying
# in fp32 (no reintroduction of the AMP overflow risk that caused the
# original two collapses). Optimizer/EMA state size is unaffected by batch
# size, so this only trades off step-to-step gradient noise, not stability.
lr: 1e-4
batch_size: 64
num_epochs: 200

# Linear LR warmup over the first N steps, then flat at `lr` — the
# standard fix used by every reference DDPM training script (HuggingFace
# diffusers, lucidrains) for early-training instability. 500 steps is the
# commonly used default; at batch_size=64 that's roughly 1.3 epochs of
# CIFAR-10 ramping up before the optimizer is trusted with the full LR.
lr_warmup_steps: 500

optimizer: adamw
weight_decay: 0.0
adam_beta1: 0.9
adam_beta2: 0.999

# EMA settings — see Phase 1's EMA class for the warmup formula this feeds
ema_decay: 0.9999

# Mixed precision — fp16 autocast during training (NOT the same as the
# fp16 QUANTIZATION variant in Phase 5 — this is training-time precision,
# that's post-training inference precision. Easy naming confusion to avoid.)
# WHY DISABLED: AMP loss-scale overflow caused grad_norm to spike to 26.96
# at step ~23,923, collapsing the model to NaN for the remaining 140 epochs.
# fp32 training is ~20% slower on T4 but eliminates the overflow risk entirely.
mixed_precision: false

# Gradient clipping — the standard value used by every reference DDPM
# training script. Combined with LR warmup (above), this is the proven
# combination for training stability rather than a value we keep retuning
# after each crash.
grad_clip_norm: 1.0

# Checkpointing
checkpoint_every_n_steps: 1000
keep_last_n_checkpoints: 3

# Logging frequency — feeds tracking.py's TrackingConfig
log_step_metrics_every: 10
log_system_metrics_every: 100
