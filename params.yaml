# =============================================================================
# params.yaml — DVC PARAMETER TRACKING
# Tiny Conditional Diffusion on CIFAR-10
# =============================================================================
#
# WHAT THIS FILE IS FOR, AND HOW IT RELATES TO HYDRA (Phase 2, Step 4):
#
#   This file exists SOLELY for DVC's staleness-detection mechanism — when
#   a dvc.yaml stage lists `params: - training.lr`, DVC reads the value of
#   training.lr from THIS file and hashes it. If you change it here, DVC
#   marks the train stage (and everything downstream) as stale on the next
#   `dvc repro`.
#
#   Hydra (which we set up in Step 4) remains the REAL configuration system
#   for actually composing and running experiments — Hydra configs live in
#   configs/ as a proper hierarchy (model/training/data/experiment), support
#   multirun sweeps, and are what train.py actually loads at runtime.
#
#   params.yaml is a deliberately FLAT, MINIMAL mirror containing only the
#   values that matter for DVC's cache-invalidation logic — not a duplicate
#   of the full Hydra config tree. We do not hand-maintain two divergent
#   sources of truth for every hyperparameter; train.py's actual behavior is
#   controlled by Hydra configs, and params.yaml is kept in sync via a small
#   sync script (see scripts/sync_params.py, written alongside Hydra in Step 4)
#   that reads the active Hydra config and rewrites this file automatically.
#
#   WHY NOT JUST POINT DVC AT THE HYDRA YAML FILES DIRECTLY:
#   Hydra's config composition (defaults lists, overrides, interpolation)
#   means the "effective" value of training.lr might come from several
#   merged files. DVC's params: mechanism expects one flat, resolved file —
#   so we materialize the resolved values here rather than asking DVC to
#   understand Hydra's composition logic (it can't).
# =============================================================================

seed: 42

data:
  normalize_mean: [0.4914, 0.4822, 0.4465]   # CIFAR-10 per-channel mean (standard values)
  normalize_std: [0.2470, 0.2435, 0.2616]    # CIFAR-10 per-channel std (standard values)

model:
  base_channels: 128
  channel_mult: [1, 2, 4, 8]
  num_res_blocks: 2
  attention_resolutions: [8, 4]
  cfg_dropout: 0.15

schedule:
  T: 1000
  type: cosine

training:
  lr: 0.0002
  batch_size: 128
  num_epochs: 200
  ema_decay: 0.9999

evaluation:
  num_samples_fid: 1000
  ddim_steps_list: [10, 25, 50, 100, 250, 1000]
  cfg_guidance_scale: 5.0

quantization:
  methods: [fp32_baseline, fp16_autocast, int8_dynamic, int8_static, qat]
  calibration_samples: 512